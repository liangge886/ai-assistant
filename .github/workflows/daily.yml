name: AI事务管家 · 每日自动运行

on:
  workflow_dispatch:
    inputs:
      task:
        description: '执行哪个任务: stock(股市简报) / briefing(综合简报) / pospal(银豹日报) / all(全部)'
        required: false
        default: 'all'
  schedule:
    # 保留 schedule 作为备用（cron-job.org 触发为主）
    - cron: '17 0 * * *'

jobs:
  stock-report:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.task == 'stock' ||
      github.event.inputs.task == 'all' ||
      github.event.inputs.task == ''
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 设置时区 上海
        run: echo "Asia/Shanghai" | sudo tee /etc/timezone && sudo apt-get install -y tzdata && sudo ln -fs /usr/share/zoneinfo/Asia/Shanghai /etc/localtime

      - name: 股市简报
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python3 stock_report.py

  daily-briefing:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.task == 'briefing' ||
      github.event.inputs.task == 'all' ||
      github.event.inputs.task == ''
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 设置时区 上海
        run: echo "Asia/Shanghai" | sudo tee /etc/timezone && sudo apt-get install -y tzdata && sudo ln -fs /usr/share/zoneinfo/Asia/Shanghai /etc/localtime

      - name: 综合简报
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python3 order_manager.py briefing

      - name: 漏单+待办提醒
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python3 order_manager.py remind_orders
          python3 order_manager.py remind_events

  pospal-report:
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.task == 'pospal'
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 设置时区 上海
        run: echo "Asia/Shanghai" | sudo tee /etc/timezone && sudo apt-get install -y tzdata && sudo ln -fs /usr/share/zoneinfo/Asia/Shanghai /etc/localtime

      - name: 银豹经营日报
        run: python3 pospal_report_standalone.py

  event-check:
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.task == 'event_check'
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 设置时区 上海
        run: echo "Asia/Shanghai" | sudo tee /etc/timezone && sudo apt-get install -y tzdata && sudo ln -fs /usr/share/zoneinfo/Asia/Shanghai /etc/localtime

      - name: 精确时间点事件提醒
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python3 order_manager.py event_remind
